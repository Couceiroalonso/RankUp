<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#07070F"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="RankUp"/>
    <meta name="description" content="Tu entrenamiento personal gamificado"/>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json"/>

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/icon-192.png"/>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>

    <title>RankUp · Fitness</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        background: #07070F;
        color: #FFF;
        font-family: 'Rajdhani', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      /* Hide scrollbar but keep scroll */
      ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('SW registered:', r.scope))
            .catch(e => console.log('SW error:', e));
        });
      }
    </script>
  </body>
</html>
